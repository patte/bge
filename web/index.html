<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>bedingungsloses Grundeinkommen</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="icon" href="/favicon.png" />
    <style>
      /* Boot: hide the app shell until the real stylesheet is applied, to avoid
         a flash of unstyled content. In dev, Vite injects the CSS via JS after
         main.js runs, so without this the raw markup (a 358px logo, the bare
         score gauge) paints for a moment on every reload. The bundled CSS sets
         #smartervote back to `visible`, so this can never hide it for real:
         in prod the render-blocking <link> reveals it at first paint. The
         bundled CSS fades opacity 0 -> 1, so the styled UI eases in. */
      #smartervote { visibility: hidden; opacity: 0; }
    </style>
  </head>
  <body>
    <!-- Mirrors the original smartervote.html structure -->
    <!-- d3 v3 (force layout). Classic script so its UMD gets a real global `this`. -->
    <script src="/vendor/d3.v3.min.js"></script>

    <div id="smartervote">
      <div id="app-header">
        <img src="/img/sv-logo-horizontal.svg" alt="smartervote" />
        <nav class="languages"></nav>
      </div>

      <div id="bubbles-container"></div>

      <button type="button" id="mobile-content-toggle" class="mobile-content-toggle">
        <span class="icon-eye"></span>
      </button>

      <div id="content"></div>

      <div id="score-gauge" style="bottom: 50%"><span>50%</span></div>

      <div id="smartervote-modal" tabindex="-1" aria-role="dialog" aria-labelledby="modalLabel"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
